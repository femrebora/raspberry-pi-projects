services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    # Use host networking so the tunnel can reach any service on the Pi
    # (Docker, native, other Compose projects) via http://localhost:<port>.
    network_mode: host
    environment:
      TUNNEL_METRICS: 0.0.0.0:7844
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info", "--output=json"]
      interval: 1m
      timeout: 10s
      retries: 3
