<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or "Pi Control Panel" }}</title>
  <script src="https://unpkg.com/htmx.org@2.0.2"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafafa; --fg: #111; --muted: #666; --card: #fff;
      --border: #ddd; --accent: #c41e3a; --green: #128a3b; --red: #b00;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0d0d0d; --fg: #f5f5f5; --muted: #999; --card: #1a1a1a; --border: #333; }
    }
    * { box-sizing: border-box; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
           background: var(--bg); color: var(--fg); margin: 0;
           line-height: 1.5; }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
             display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    header h1 { margin: 0; font-size: 1.1rem; color: var(--accent); }
    header a { color: var(--fg); text-decoration: none; padding: 0.3rem 0.6rem; border-radius: 6px; }
    header a:hover { background: var(--card); }
    main { padding: 1rem 1.5rem; max-width: 60rem; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
    .card h2 { margin: 0 0 0.5rem; font-size: 1rem; }
    .row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .pill { font-size: 0.75rem; padding: 0.1rem 0.5rem; border-radius: 999px;
            border: 1px solid var(--border); }
    .pill.up    { color: var(--green); border-color: var(--green); }
    .pill.down  { color: var(--muted); }
    .pill.partial { color: orange; border-color: orange; }
    .pill.unknown { color: var(--muted); border-color: var(--muted); }
    button, .btn { font: inherit; padding: 0.35rem 0.7rem; border: 1px solid var(--border);
                   border-radius: 6px; background: var(--bg); color: var(--fg);
                   cursor: pointer; text-decoration: none; }
    button:hover, .btn:hover { background: var(--card); }
    form { display: inline; }
    input[type=text], input[type=password] {
      font: inherit; padding: 0.4rem 0.5rem; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg); color: var(--fg); width: 100%;
    }
    label { display: block; margin: 0.4rem 0 0.2rem; font-size: 0.85rem; color: var(--muted); }
    pre { background: var(--card); padding: 0.75rem; border-radius: 6px;
          overflow-x: auto; font-size: 0.8rem; line-height: 1.4; }
    .meta { color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <h1>🥧 Pi Control Panel</h1>
    <a href="/">Projects</a>
    <a href="/ollama/models">Ollama</a>
    <a href="/router/health">Router</a>
  </header>
  <main>
    {% block body %}{% endblock %}
  </main>
</body>
</html>
