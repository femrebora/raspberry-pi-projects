services:
  router:
    build: .
    container_name: llm-router
    restart: unless-stopped
    ports:
      - "8088:8088"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8088/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
