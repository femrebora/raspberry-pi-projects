services:
  hybrid:
    build: ./app
    container_name: hybrid-llm
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:1b}
      ROUTER_URL: ${ROUTER_URL:-http://host.docker.internal:8088}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-30}
      ROUTER_TIMEOUT: ${ROUTER_TIMEOUT:-30}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
